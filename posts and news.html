<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Goderich Chess Club</title>
  
  <style>
    /* Reset & Base System Styles */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    }
    *:focus-visible {
      outline: 3px solid #D97706 !important;
      outline-offset: 2px;
    }
    body {
      background-color: #0B1329;
      color: #F1F5F9;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      /* FIX: Removed rigid viewport locks to allow natural scroll tracking down the page */
      overflow-y: auto;
      min-height: 100vh;
    }
    
    .container {
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      border: 0;
    }

    /* HEADER & Navigation Bar */
    .site-header {
      background-color: #020617;
      border-bottom: 1px solid rgba(217, 119, 6, 0.2);
      position: sticky;
      top: 0;
      z-index: 50;
    }
    .navbar-flex {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 80px;
    }
    .brand-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 22px;
      font-weight: 700;
      color: #FFFFFF;
      text-decoration: none;
    }
    .gold-text {
      color: #D97706;
    }
    .nav-links {
      display: flex;
      align-items: center;
      gap: 28px;
    }
    .nav-item {
      color: #CBD5E1;
      text-decoration: none;
      font-weight: 500;
      font-size: 16px;
      transition: color 0.2s ease;
    }
    .nav-item:hover, .nav-item.active {
      color: #D97706;
    }
    .nav-item.active {
      border-bottom: 2px solid #D97706;
      padding-bottom: 4px;
    }
    .btn-join {
      background-color: #D97706;
      color: #020617;
      font-weight: 700;
      padding: 10px 20px;
      border-radius: 8px;
      text-decoration: none;
      transition: background-color 0.2s ease;
    }
    .btn-join:hover {
      background-color: #F59E0B;
    }

    /* HERO STABLE GRID SYSTEM Layout */
    .hero-main {
      padding: 60px 0;
    }
    .split-layout {
      display: grid;
      grid-template-columns: 1fr;
      gap: 48px;
    }
    
    @media (min-width: 992px) {
      .hero-main { padding: 80px 0; }
      .split-layout {
        grid-template-columns: 7fr 5fr;
        align-items: start;
      }
    }

    /* Content Layout Typographies */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background-color: rgba(217, 119, 6, 0.1);
      border: 1px solid rgba(217, 119, 6, 0.3);
      color: #D97706;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 24px;
    }
    .hero-title {
      font-size: 40px;
      font-weight: 800;
      line-height: 1.15;
      color: #FFFFFF;
      margin-bottom: 20px;
    }
    @media (min-width: 768px) {
      .hero-title { font-size: 54px; }
    }
    .hero-desc {
      font-size: 18px;
      color: #94A3B8;
      margin-bottom: 36px;
      line-height: 1.6;
    }
    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    @media (min-width: 480px) {
      .btn-group { flex-direction: row; }
    }
    .btn-primary {
      background-color: #D97706;
      color: #020617;
      font-weight: 700;
      font-size: 18px;
      padding: 14px 28px;
      border-radius: 12px;
      text-decoration: none;
      text-align: center;
      transition: background-color 0.2s ease;
    }
    .btn-primary:hover { background-color: #F59E0B; }
    
    .btn-secondary {
      border: 2px solid #334155;
      color: #E2E8F0;
      font-weight: 600;
      font-size: 18px;
      padding: 12px 26px;
      border-radius: 12px;
      text-decoration: none;
      text-align: center;
      transition: all 0.2s ease;
    }
    .btn-secondary:hover {
      border-color: rgba(217, 119, 6, 0.5);
      background-color: #1E293B;
    }

    /* CARD Container Details Block */
    .meeting-card {
      background: linear-gradient(180deg, #020617 0%, #060B18 100%);
      border: 2px solid rgba(217, 119, 6, 0.6);
      border-radius: 20px;
      padding: 32px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }
    .card-header-flex {
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid #1E293B;
      padding-bottom: 16px;
      margin-bottom: 24px;
    }
    .card-title {
      font-size: 16px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #D97706;
    }
    .info-row {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 24px;
    }
    .info-icon {
      font-size: 22px;
      line-height: 1;
      margin-top: 4px;
    }
    .info-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #64748B;
      font-weight: 600;
      margin-bottom: 2px;
    }
    .info-value {
      font-size: 16px;
      font-weight: 600;
      color: #FFFFFF;
    }
    .address-block {
      font-style: normal;
      font-size: 16px;
      font-weight: 600;
      color: #FFFFFF;
    }
    .address-sub {
      font-size: 14px;
      color: #94A3B8;
      font-weight: 400;
      display: block;
      margin-top: 2px;
    }
    .card-footer {
      border-top: 1px solid #1E293B;
      padding-top: 24px;
      margin-top: 8px;
    }
    .btn-rsvp {
      display: block;
      width: 100%;
      background: #D97706;
      color: #020617;
      font-weight: 700;
      padding: 14px;
      border-radius: 12px;
      text-decoration: none;
      text-align: center;
      font-size: 16px;
      transition: background-color 0.2s ease;
    }
    .btn-rsvp:hover { background-color: #F59E0B; }
    
    .card-note {
      font-size: 12px;
      color: #64748B;
      text-align: center;
      margin-top: 12px;
    }

    /* FOOTER Elements CSS */
    .site-footer {
      background-color: #020617;
      border-top: 1px solid rgba(217, 119, 6, 0.2);
      padding: 40px 0;
      margin-top: 60px;
    }
    .footer-flex {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      text-align: center;
    }
    @media (min-width: 768px) {
      .footer-flex {
        flex-direction: row;
        justify-content: space-between;
        text-align: left;
      }
    }
    .footer-text {
      color: #64748B;
      font-size: 14px;
    }
    .footer-right {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    @media (min-width: 768px) { align-items: flex-end; }
    
    .footer-nav {
      display: flex;
      gap: 16px;
    }
    .footer-nav-link {
      color: #94A3B8;
      text-decoration: none;
      font-size: 14px;
    }
    .footer-nav-link:hover { color: #D97706; }
    
    .social-links {
      display: flex;
      gap: 12px;
      margin-top: 4px;
    }
    .social-icon-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background-color: #0B1329;
      border: 1px solid #1E293B;
      color: #94A3B8;
      text-decoration: none;
      transition: all 0.2s ease;
    }
    .social-icon-btn:hover {
      color: #D97706;
      border-color: #D97706;
      transform: translateY(-2px);
    }
    .social-icon-btn svg {
      width: 20px;
      height: 20px;
      fill: currentColor;
    }
    
    @media (max-width: 767px) {
      .nav-links { display: none; }
    }
  /* Button container layout alignment */
  .social-container {
    display: flex;
    gap: 16px;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  /* Core button design frames */
  .social-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 46px;
    height: 46px;
    border-radius: 50%;
    background-color: #0B1329;
    border: 2px solid #1E293B;
    color: #94A3B8;
    text-decoration: none;
    transition: all 0.2s ease-in-out;
  }

  /* Nested graphic element parameters */
  .social-btn svg {
    width: 22px;
    height: 22px;
    fill: currentColor;
  }

  /* Hover color states using the gold chess theme */
  .social-btn:hover {
    color: #D97706;
    border-color: #D97706;
    transform: translateY(-3px);
    box-shadow: 0 4px 12px rgba(217, 119, 6, 0.15);
  }
/* Chess.com authentic pawn green brand styling */
  .social-btn.chess:hover {
    color: #81B64C;
    border-color: #81B64C;
  }
      /* Responsive outer container */
  .table-container {
    width: 100%;
    overflow-x: auto;
    margin: 32px 0;
    border-radius: 12px;
    border: 1px solid rgba(217, 119, 6, 0.3);
    box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
  }

  /* Table base structure */
  .books-table {
    width: 100%;
    border-collapse: collapse;
    background-color: #020617;
    text-align: left;
    font-size: 16px;
  }

  /* Header row design */
  .books-table th {
    background-color: #0B1329;
    color: #D97706;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 16px 20px;
    border-bottom: 2px solid rgba(217, 119, 6, 0.5);
  }

  /* Data cell layout rows */
  .books-table td {
    padding: 14px 20px;
    color: #E2E8F0;
    border-bottom: 1px solid #1E293B;
  }

  /* Right column grid cell align */
  .books-table th:last-child,
  .books-table td:last-child {
    text-align: right;
    width: 120px;
  }

  /* Highlight accent text for pricing elements */
  .price-cell {
    color: #D97706 !important;
    font-weight: 600;
  }

  /* Interactive hover highlight tracks */
  .books-table tbody tr:hover {
    background-color: rgba(255, 255, 255, 0.03);
  }
a{
  color: #81B64C;
}
  </style>
</head>
